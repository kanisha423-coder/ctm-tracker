.p-inconclusive{background:#ede8f5;color:#4a2c7a;border-color:#c0a8e8}
.p-coaching{background:#e8f0dd;color:#2c5f0f;border-color:#b8d898}
.reminder-note{background:#fdf8ee;border:1px solid #e8d898;border-radius:8px;padding:12px 16px;font-size:0.82rem;color:#5a4a00;margin-bottom:12px;line-height:1.5}
